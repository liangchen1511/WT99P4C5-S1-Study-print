## IDF Component Manager Manifest File
dependencies:
  ## Required IDF version
  idf: ">=5.3"
  espressif/esp-brookesia:
    version: "0.4.*"
  esp_video:
    version: "0.8.*"
    public: true
  espressif/esp_wifi_remote:
    version: "~1.5.1"
    rules:
      - if: "target in [esp32p4, esp32h2]"
  espressif/esp_hosted:
    # 2.12.x Kconfig uses $(ESP_IDF_VERSION)>=6.1; IDF 5.5 needs cmake patch
    version: "2.12.9"
    rules:
      - if: "target in [esp32p4, esp32h2]"
  espressif/esp_jpeg:
    version: "*"
  espressif/esp_xiaozhi:
    version: "*"