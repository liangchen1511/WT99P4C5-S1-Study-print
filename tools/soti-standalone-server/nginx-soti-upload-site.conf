# SoTi 上传 — 完整 server 示例（Ubuntu / nginx 1.18+）
#
# ── 若仍是 HTTP 403，先区分「谁」返回的 ──
# 1) 本机（在 ECS 上执行）：
#      curl -sS -D- http://127.0.0.1:3000/upload/health -o - | head -n 8
#    须为 200 + JSON；否则先起 Python 服务。
# 2) 只测 Nginx、不经公网（仍在 ECS）：
#      curl -sS -D- -H "Host: 8.154.20.8" http://127.0.0.1/upload/health -o - | head -n 8
#    须为 200；若为 404 → 本 server 未生效：检查 sites-enabled、server_name 是否含 EIP、nginx -t 后 reload。
# 3) 公网（电脑执行，URL 只用 IP，不要 -H Host:域名）：
#      curl.exe -v http://8.154.20.8/upload/health
#    看响应头 Server: 若是 Beaver → 仍是阿里云边缘备案策略（与 Nginx 配置无关），只能包年包月+备案或换已备案入口；
#    若是 nginx → 再查该 server 里是否有 deny/return 403。
# 4) 公网若 Beaver 连「仅 IP、无域名 Host」也拦 80：可试 HTTPS（需 listen 443 + 证书）或阿里云工单问「按量 ECS 80 未备案是否一律拦截」。
#
# 部署：
#   sudo cp nginx-soti-upload-site.conf /etc/nginx/sites-available/soti-upload
#   编辑本文件内 server_name、若上游不是 127.0.0.1:3000 则改 proxy_pass
#   sudo ln -sf /etc/nginx/sites-available/soti-upload /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Python 须监听 127.0.0.1:3000（或改下面 proxy_pass 与 LISTEN/PORT 一致）：
#   LISTEN=127.0.0.1 PORT=3000 python3 soti_upload_server.py
#
# 直连 EIP 调试：设备 URL 用 http://<EIP>/upload 时，请求 Host 为 EIP，server_name 必须含该 EIP。
# 域名未备案时，公网用域名访问仍可能被 Beaver 拦；用 IP 访问请先确认 curl http://<EIP>/upload/health 为 200。

server {
    listen 80;
    listen [::]:80;

    # 按实际修改：EIP + 已备案域名（备案前公网测 IP 勿用 -H "Host: 域名"）
    server_name 8.154.20.8 souti.novaio.top;

    access_log /var/log/nginx/soti-upload.access.log;
    error_log  /var/log/nginx/soti-upload.error.log;

    client_max_body_size 20m;
    client_body_timeout 600s;
    send_timeout 600s;

    # 家长控制台（须与 /opt/soti/static/parent 及 parent_*.py 一并部署）
    location /parent/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /parent {
        return 301 /parent/;
    }

    location = / {
        return 302 /parent/;
    }

    location /upload {
        client_max_body_size 20m;
        client_body_timeout 600s;
        send_timeout 600s;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # 可选：大 body 时减轻缓冲（需 nginx -t 通过）
        # proxy_request_buffering off;
    }

    # 若本 server 专用于 SoTi、不希望暴露根路径，可取消下一行注释
    # location / { return 404; }
}
