# 含 /upload 及子路径；诊断: GET /upload/health（无 Token，curl 看 200 JSON 或 Beaver 403 HTML）
# 分片：POST /upload?st=init&total=（可无 body）→ part&sid&off → commit&sid（与整包同路径）
# ESP32 + SDIO Wi‑Fi 上传 JPEG 很慢；默认 client_body_timeout / proxy_read_timeout
# 常为 60s，易导致连接被掐断，Nginx 记 499（客户端先断），设备串口长时间无返回。
#
# 修改后: sudo nginx -t && sudo systemctl reload nginx

# 不要用「curl http://<EIP>/... -H "Host: 你的域名"」做公网探测：边缘会按域名做备案校验 → Beaver 403，
# 请求到不了本机 Nginx。公网直连 EIP 调试时请 Host 与 URL 一致为 IP（或不带 -H，curl 默认 Host 即 EIP）。
#
# 若设备用 http://<EIP>/upload：请求头 Host 为 EIP。须让「含本 location」的 server 能匹配该 Host，否则
# 会落到别的 default_server → /upload/health 为 404。至少让本 server 匹配 EIP，例如：
#   server_name 8.154.20.8;
# 若同一 server 仍要兼容已备案后的域名，可写：server_name 8.154.20.8 souti.novaio.top;
# 公网验证（勿加 -H 域名）：curl -sS -D- http://<EIP>/upload/health -o -
#
location /parent/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_read_timeout 120s;
}

location = /parent {
    return 301 /parent/;
}

location /upload {
    client_max_body_size 20m;

    # 等客户端把整段 POST body 收齐（ESP 可能需数分钟）
    client_body_timeout 600s;
    send_timeout 600s;

    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 慢上传 + 豆包推理久：放宽与上游 Python 的读写超时
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    # 可选：边收边转给后端，减轻「先收满再转发」的缓冲压力（需 nginx -t 通过即可）
    # proxy_request_buffering off;
}
